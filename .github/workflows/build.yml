name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write  # needed for the release-on-tag step

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Bring in rrxiv (schema + CLI source) as a sibling of the
      # paper checkout so the extract + verify scripts can resolve
      # the relative paths they look for. `path: ../<name>` resolves
      # under $GITHUB_WORKSPACE/.. which is a sibling of the paper
      # checkout — supported by actions/checkout v4+.
      - name: Check out rrxiv (schema + CLI)
        uses: actions/checkout@v5
        with:
          repository: random-walks/rrxiv
          path: ../rrxiv
          ref: main

      - name: Check out rrxiv-python (CLI)
        uses: actions/checkout@v5
        with:
          repository: random-walks/rrxiv-python
          path: ../rrxiv-python
          ref: main

      - name: Install tectonic
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net | sh
          sudo mv tectonic /usr/local/bin/

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install jsonschema for verify
        run: pip install jsonschema

      - name: Build PDF
        run: ./scripts/build.sh

      - name: Extract CIR
        run: ./scripts/extract-cir.sh

      - name: Verify CIR against schema
        run: ./scripts/verify.sh

      - name: Upload workflow artifacts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: paper
          path: |
            build/main.pdf
            build/main.cir.json
            build/main.rrxiv.aux
          retention-days: 30

      # On a tag push (e.g. `v1`, `v1.0.0`), publish the built
      # artifacts as a GitHub Release so downstream consumers
      # (rrxiv-instance, mirrors) can pull the canonical PDF + CIR
      # without re-running tectonic.
      - name: Release on tag
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/main.pdf
            build/main.cir.json
            build/main.rrxiv.aux
          generate_release_notes: true
          fail_on_unmatched_files: true
